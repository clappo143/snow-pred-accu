name: resort operations telemetry

on:
  schedule:
    # UTC cadence: 30 min over the likely 3pm–10am AEST window. DST shifts the
    # local label by an hour; coverage is measured from captures, not assumed.
    - cron: '*/30 5-23 * * *'
    # Daytime baseline, roughly 10am–3pm AEST.
    - cron: '0 0-4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: resort-operations-telemetry
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: collect all independent public sources
        run: python -m operations.collect --once
      - name: commit append-only telemetry archive
        if: always()
        run: |
          git config user.name "snow-bot"
          git config user.email "actions@github.com"
          git add -- data/operations data/operations.sqlite data/operations_export_v1.json
          git diff --cached --quiet && exit 0
          git commit -m "data: operations $(TZ=Australia/Sydney date '+%Y-%m-%d %H:%M')"
          git push
