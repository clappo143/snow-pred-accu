name: daily snow tracking

on:
  schedule:
    # 6pm AEST = 08:00 UTC (evening forecast snapshot)
    - cron: "0 8 * * *"
    # 7:45am AEST = 21:45 UTC previous day (morning actuals + scoring)
    - cron: "45 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Everything except Snowatch: reliable GitHub-hosted cloud runners, never
  # dependent on the self-hosted runner being online.
  cloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: pick run type by AEST hour
        id: mode
        run: |
          H=$(TZ=Australia/Sydney date +%H)
          if [ "$H" -lt 12 ]; then echo "script=run_morning.py --skip snowatch" >> "$GITHUB_OUTPUT";
          else echo "script=run_evening.py --skip snowatch" >> "$GITHUB_OUTPUT"; fi
      - run: python ${{ steps.mode.outputs.script }}
      - name: render dashboard
        if: always()
        run: python dashboard.py
      - name: commit & push
        if: always()
        run: |
          git config user.name "snow-bot"
          git config user.email "actions@github.com"
          for attempt in 1 2 3; do
            git add data charts docs
            git diff --cached --quiet && { echo "nothing to commit"; break; }
            git commit -m "data: $(TZ=Australia/Sydney date '+%Y-%m-%d %H:%M') run (cloud)"
            git push && break
            echo "push rejected (attempt $attempt) — resyncing and redoing the run"
            git fetch origin main
            git reset --hard origin/main
            # A collector may fail transiently on this redo (e.g. an API
            # timeout); don't let that abort the step via bash -e and lose
            # every other collector's freshly-recollected data.
            python ${{ steps.mode.outputs.script }} || true
            python dashboard.py || true
          done

  # Snowatch only: Cloudflare blocks GitHub's published Actions IP ranges
  # (confirmed 2026-07-09), so this runs on a self-hosted runner instead. If
  # the runner is offline, GitHub simply queues this job — no custom retry
  # needed — and it runs whenever the runner is next online.
  # It fires on both crons: run_evening.py infers the snapshot slot from the
  # clock (run='am' before noon AEST, 'pm' after), so the same invocation
  # captures Snowatch's fresh 6-7am issuance in the morning slot.
  snowatch-home:
    runs-on: [self-hosted, snow-pred-accu]
    steps:
      - uses: actions/checkout@v4
      - run: pip3 install -r requirements.txt
      - run: python3 run_evening.py --only snowatch
      - name: render dashboard
        if: always()
        run: python3 dashboard.py
      - name: commit & push
        if: always()
        run: |
          git config user.name "snow-bot"
          git config user.email "actions@github.com"
          for attempt in 1 2 3; do
            git add data charts docs
            git diff --cached --quiet && { echo "nothing to commit"; break; }
            git commit -m "data: $(TZ=Australia/Sydney date '+%Y-%m-%d %H:%M') run (snowatch-home)"
            git push && break
            echo "push rejected (attempt $attempt) — resyncing and redoing the run"
            git fetch origin main
            git reset --hard origin/main
            # See the cloud job's comment: don't let a transient collector
            # failure on this redo abort the step via bash -e.
            python3 run_evening.py --only snowatch || true
            python3 dashboard.py || true
          done
